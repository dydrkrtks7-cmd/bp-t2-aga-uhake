<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b71c1c"/>
      <stop offset="100%" stop-color="#880e4f"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd600"/>
      <stop offset="100%" stop-color="#880e4f"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="-34" cy="380" r="91" fill="#880e4f" opacity="0.18"/>
    <circle cx="1055" cy="-100" r="27" fill="#880e4f" opacity="0.15"/>
    <circle cx="311" cy="360" r="32" fill="#880e4f" opacity="0.11"/>
    <circle cx="245" cy="726" r="41" fill="#880e4f" opacity="0.07"/>
    <circle cx="135" cy="61" r="48" fill="#880e4f" opacity="0.05"/>
    <circle cx="5" cy="666" r="51" fill="#880e4f" opacity="0.18"/>
    <rect x="1292" y="209" width="94" height="42" rx="8" fill="#b71c1c" opacity="0.08" transform="rotate(26, 1067, 269)"/>
    <rect x="213" y="8" width="66" height="43" rx="8" fill="#b71c1c" opacity="0.11" transform="rotate(1, 360, 538)"/>
    <rect x="83" y="114" width="95" height="89" rx="8" fill="#b71c1c" opacity="0.05" transform="rotate(34, 1280, 687)"/>
    <rect x="349" y="172" width="38" height="95" rx="8" fill="#b71c1c" opacity="0.13" transform="rotate(11, 1241, 698)"/>
    <rect x="1185" y="119" width="71" height="40" rx="8" fill="#b71c1c" opacity="0.03" transform="rotate(15, 786, 238)"/>
    <rect x="1065" y="577" width="62" height="36" rx="8" fill="#b71c1c" opacity="0.05" transform="rotate(4, 197, 587)"/>
    <rect x="-99" y="677" width="21" height="77" rx="8" fill="#b71c1c" opacity="0.03" transform="rotate(0, 297, -58)"/>
    <rect x="-66" y="-30" width="57" height="55" rx="8" fill="#b71c1c" opacity="0.03" transform="rotate(13, 1008, 432)"/>
    <polygon points="299,359 384,529 214,529" fill="#880e4f" opacity="0.11"/>
    <polygon points="1055,465 1112,579 998,579" fill="#880e4f" opacity="0.06"/>
    <polygon points="348,583 392,671 304,671" fill="#880e4f" opacity="0.12"/>
    <polygon points="-92,352 -58,420 -126,420" fill="#880e4f" opacity="0.10"/>

  <!-- Wave at bottom -->
  <path d="M0,584 C360,607 840,561 1200,584 L1200,630 L0,630Z" fill="#880e4f" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    도메인 지수 탈모 방지 및 앵커 텍스트 이식 가이드
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
     — 지수 성장 클리닉
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#ffd600" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#ffd600" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
     도메인 지수 탈모 방지 및 앵커 텍스트 이식 가이드 — 지수 성장 클리닉
  </text>
</svg>