<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="973" cy="-56" r="36" fill="#1d4ed8" opacity="0.20"/>
    <circle cx="232" cy="184" r="43" fill="#1d4ed8" opacity="0.19"/>
    <circle cx="1090" cy="636" r="55" fill="#1d4ed8" opacity="0.07"/>
    <circle cx="1173" cy="160" r="23" fill="#1d4ed8" opacity="0.05"/>
    <circle cx="625" cy="304" r="46" fill="#1d4ed8" opacity="0.10"/>
    <circle cx="-68" cy="597" r="76" fill="#1d4ed8" opacity="0.18"/>
    <rect x="1162" y="81" width="67" height="69" rx="8" fill="#2563eb" opacity="0.04" transform="rotate(27, 571, 659)"/>
    <rect x="1273" y="683" width="63" height="60" rx="8" fill="#2563eb" opacity="0.10" transform="rotate(0, 533, 482)"/>
    <rect x="123" y="632" width="34" height="61" rx="8" fill="#2563eb" opacity="0.04" transform="rotate(8, 459, 196)"/>
    <rect x="300" y="708" width="37" height="94" rx="8" fill="#2563eb" opacity="0.05" transform="rotate(6, 316, 702)"/>
    <rect x="351" y="173" width="77" height="37" rx="8" fill="#2563eb" opacity="0.11" transform="rotate(34, 646, 257)"/>
    <rect x="596" y="103" width="89" height="37" rx="8" fill="#2563eb" opacity="0.12" transform="rotate(30, 572, 83)"/>
    <rect x="654" y="5" width="58" height="57" rx="8" fill="#2563eb" opacity="0.08" transform="rotate(20, 1193, 102)"/>
    <rect x="151" y="37" width="31" height="44" rx="8" fill="#2563eb" opacity="0.03" transform="rotate(15, 528, 459)"/>
    <polygon points="1136,466 1194,582 1078,582" fill="#1d4ed8" opacity="0.10"/>
    <polygon points="433,-58 529,134 337,134" fill="#1d4ed8" opacity="0.10"/>
    <polygon points="1216,274 1274,390 1158,390" fill="#1d4ed8" opacity="0.12"/>
    <polygon points="1159,-141 1239,19 1079,19" fill="#1d4ed8" opacity="0.03"/>

  <!-- Wave at bottom -->
  <path d="M0,588 C360,609 840,567 1200,588 L1200,630 L0,630Z" fill="#1d4ed8" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    도메인 지수 탈모 방지 및 앵커 텍스트 이식 가이드
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
     — 지수 성장 클리닉
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#f59e0b" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
     도메인 지수 탈모 방지 및 앵커 텍스트 이식 가이드 — 지수 성장 클리닉
  </text>
</svg>